name: Go
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      module: easyapp
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Test with the Go CLI
        run: |
          cd ${module}
          go test ./...
